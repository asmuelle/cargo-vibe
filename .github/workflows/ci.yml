name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cargo-vibecode

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cargo-vibecode

      - name: Format
        run: cargo fmt --all --check
        working-directory: cargo-vibecode

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: cargo-vibecode

      - name: Test
        run: cargo test --all-features
        working-directory: cargo-vibecode

      - name: Install smoke
        run: cargo install --path . --locked
        working-directory: cargo-vibecode
