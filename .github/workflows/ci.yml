name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout ai-tools-core
        uses: actions/checkout@v6
        with:
          repository: asmuelle/ai-tools-core
          path: ai-tools-core

      - name: Link ai-tools-core sibling checkout
        run: ln -sfn "$GITHUB_WORKSPACE/ai-tools-core" "$GITHUB_WORKSPACE/../ai-tools-core"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --all-features --locked
      - run: cargo test --all-features --locked
