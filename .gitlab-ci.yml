# GitLab CI/CD pipeline for cargo-vibe
#
# cargo-vibe is a shell orchestrator. Most tests are integration-level
# (subprocess delegation). The pipeline ensures the binary builds and
# lints pass. Full integration testing requires the downstream tools
# (diff-risk, cargo-impact, spec-drift, cargo-context) to be installed.

stages:
  - lint
  - build
  - integration
  - pass

variables:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

default:
  interruptible: true
  before_script:
    - rustup show

# ── Lint stage ──────────────────────────────────────────────────────

rustfmt:
  stage: lint
  image: rust:latest
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check

clippy:
  stage: lint
  image: rust:latest
  script:
    - rustup component add clippy
    - cargo clippy --all-targets --all-features -- -D warnings

# ── Build stage ─────────────────────────────────────────────────────

build:release:
  stage: build
  image: rust:latest
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/cargo-vibe
    expire_in: 7 days

build:msrv:
  stage: build
  image: rust:1.82
  script:
    - cargo check --all-features

# ── Integration stage ───────────────────────────────────────────────
#
# These jobs install the downstream tools and verify cargo-vibe can
# invoke them. Allow failure — tools may not be published yet.

smoke:help:
  stage: integration
  image: rust:latest
  needs: [build:release]
  script:
    - ./target/release/cargo-vibe --help
    - ./target/release/cargo-vibe check --help
    - ./target/release/cargo-vibe fix --help
    - ./target/release/cargo-vibe risk --help
    - ./target/release/cargo-vibe impact --help
    - ./target/release/cargo-vibe drift --help
    - ./target/release/cargo-vibe context --help

smoke:config:
  stage: integration
  image: rust:latest
  needs: [build:release]
  script:
    # Verify config parsing doesn't panic on valid input
    - |
      cat > .cargo-vibe.toml << 'EOF'
      [vibe]
      token_budget = 32000
      threshold = 7.0

      [diff_risk]
      enabled = true
      threshold = 8.0

      [cargo_impact]
      enabled = true

      [spec_drift]
      enabled = false
      EOF
    - ./target/release/cargo-vibe --root . check --since HEAD 2>&1 || true
  allow_failure: true

# ── Security scan ───────────────────────────────────────────────────

security:audit:
  stage: integration
  image: rust:latest
  needs: [build:release]
  script:
    - cargo audit || true
  allow_failure: true

# ── Pass gate ────────────────────────────────────────────────────────

ci-pass:
  stage: pass
  image: alpine:latest
  needs:
    - rustfmt
    - clippy
    - build:release
    - build:msrv
    - smoke:help
  script:
    - echo "All required jobs passed."
